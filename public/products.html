<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produk - Aplikasi Keuangan</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .search-box {
            flex: 1;
            max-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        .table-responsive {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <h1>💰 Aplikasi Keuangan</h1>
        <ul class="nav-links">
            <li><a href="/">Beranda</a></li>
            <li><a href="/products">Produk</a></li>
            <li><a href="/profile">Profile</a></li>
        </ul>
        <div class="user-info">
            <span id="username">Admin</span>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="products-header">
            <h2>Daftar Produk</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari produk...">
            </div>
            <button class="btn btn-primary action-btn" id="addProductBtn">+ Tambah Produk</button>
        </div>

        <!-- Products Table -->
        <div class="table-responsive">
            <table class="table" id="productsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Harga</th>
                        <th>Stok</th>
                        <th>Kategori</th>
                        <th>Nilai Stok</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="productsBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 2rem;">
                            Memuat data...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" id="closeModal">&times;</span>
                <h2 id="modalTitle">Tambah Produk</h2>
            </div>

            <form id="productForm">
                <input type="hidden" id="productId">

                <div class="form-group">
                    <label for="productName">Nama Produk</label>
                    <input type="text" id="productName" required>
                </div>

                <div class="form-group">
                    <label for="productPrice">Harga</label>
                    <input type="number" id="productPrice" min="0" required>
                </div>

                <div class="form-group">
                    <label for="productStock">Stok</label>
                    <input type="number" id="productStock" min="0" required>
                </div>

                <div class="form-group">
                    <label for="productCategory">Kategori</label>
                    <select id="productCategory" required>
                        <option value="">-- Pilih Kategori --</option>
                        <option value="Elektronik">Elektronik</option>
                        <option value="Fashion">Fashion</option>
                        <option value="Makanan">Makanan</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-success">Simpan</button>
                    <button type="button" class="btn btn-warning" id="cancelBtn">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        let allProducts = [];
        let editingId = null;

        const modal = document.getElementById("productModal");
        const closeModal = document.getElementById("closeModal");
        const cancelBtn = document.getElementById("cancelBtn");
        const addProductBtn = document.getElementById("addProductBtn");
        const productForm = document.getElementById("productForm");
        const searchInput = document.getElementById("searchInput");

        // Load products
        async function loadProducts() {
            try {
                allProducts = await apiCall("/products");
                renderProducts(allProducts);
            } catch (error) {
                showAlert("Gagal memuat produk", "danger");
            }
        }

        // Render products
        function renderProducts(products) {
            const tbody = document.getElementById("productsBody");
            
            if (products.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 2rem;">
                            Tidak ada produk
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${formatCurrency(p.price)}</td>
                    <td>${p.stock}</td>
                    <td>${p.category}</td>
                    <td>${formatCurrency(p.price * p.stock)}</td>
                    <td>
                        <button class="btn btn-warning action-btn" onclick="editProduct(${p.id})">Edit</button>
                        <button class="btn btn-danger action-btn" onclick="deleteProduct(${p.id})">Hapus</button>
                    </td>
                </tr>
            `).join("");
        }

        // Search products
        searchInput.addEventListener("input", (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(keyword) || 
                p.category.toLowerCase().includes(keyword)
            );
            renderProducts(filtered);
        });

        // Open add product modal
        addProductBtn.addEventListener("click", () => {
            editingId = null;
            document.getElementById("modalTitle").textContent = "Tambah Produk";
            productForm.reset();
            document.getElementById("productId").value = "";
            modal.classList.add("active");
        });

        // Close modal
        closeModal.addEventListener("click", () => modal.classList.remove("active"));
        cancelBtn.addEventListener("click", () => modal.classList.remove("active"));
        modal.addEventListener("click", (e) => {
            if (e.target === modal) modal.classList.remove("active");
        });

        // Edit product
        function editProduct(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;

            editingId = id;
            document.getElementById("modalTitle").textContent = "Edit Produk";
            document.getElementById("productId").value = product.id;
            document.getElementById("productName").value = product.name;
            document.getElementById("productPrice").value = product.price;
            document.getElementById("productStock").value = product.stock;
            document.getElementById("productCategory").value = product.category;
            modal.classList.add("active");
        }

        // Submit form
        productForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("productName").value;
            const price = parseFloat(document.getElementById("productPrice").value);
            const stock = parseInt(document.getElementById("productStock").value);
            const category = document.getElementById("productCategory").value;

            showLoading();

            try {
                if (editingId) {
                    // Update
                    await apiCall(`/products/${editingId}`, {
                        method: "PUT",
                        body: JSON.stringify({ price, stock })
                    });
                    showAlert("Produk berhasil diperbarui", "success");
                } else {
                    // Create
                    await apiCall("/products", {
                        method: "POST",
                        body: JSON.stringify({ name, price, stock, category })
                    });
                    showAlert("Produk berhasil ditambahkan", "success");
                }

                hideLoading();
                modal.classList.remove("active");
                loadProducts();
            } catch (error) {
                hideLoading();
                showAlert("Gagal menyimpan produk", "danger");
            }
        });

        // Delete product
        async function deleteProduct(id) {
            if (!confirm("Apakah Anda yakin ingin menghapus produk ini?")) return;

            showLoading();

            try {
                await apiCall(`/products/${id}`, { method: "DELETE" });
                showAlert("Produk berhasil dihapus", "success");
                hideLoading();
                loadProducts();
            } catch (error) {
                hideLoading();
                showAlert("Gagal menghapus produk", "danger");
            }
        }

        // Logout
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            try {
                await fetch("/api/auth/logout", { method: "POST" });
                showAlert("Logout berhasil", "success");
                setTimeout(() => {
                    window.location.href = "/";
                }, 1000);
            } catch (error) {
                showAlert("Terjadi kesalahan", "danger");
            }
        });

        // Load products on page load
        loadProducts();
    </script>
</body>
</html>
